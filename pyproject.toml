[tool.ruff]
line-length = 120
target-version = "py311"

[tool.ruff.lint]
select = ["B", "E4", "E7", "E9", "F", "I", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
files = ["acceptance", "distribution", "doubt"]

[tool.coverage.run]
branch = true
source = ["doubt"]

[tool.coverage.report]
show_missing = true
