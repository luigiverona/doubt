name: Release

on:
  push:
    tags:
      - "1.0.*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

env:
  PYTHONDONTWRITEBYTECODE: "1"
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  validate:
    name: Validate deterministic release assets
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel-20260712.0.555161@sha256:212b1e518e94ee9c52be55e8a32da75fcf11e7b5610b80b49479e67880102406
    steps:
      - name: Bootstrap pinned Arch validation environment
        run: |
          printf 'Server = https://archive.archlinux.org/repos/2026/07/12/$repo/os/$arch\n' \
            >/etc/pacman.d/mirrorlist
          pacman -Sy --noconfirm --needed bash fish git python python-pip
      - name: Check out annotated release tag
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}
      - name: Verify immutable release source
        run: |
          [[ "$GITHUB_REF_TYPE" == tag ]]
          [[ "$GITHUB_REF" == "refs/tags/$RELEASE_TAG" ]]
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" cat-file -t "$GITHUB_REF")" = tag
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" for-each-ref \
            --format='%(contents:subject)' "$GITHUB_REF")" = "doubt $RELEASE_TAG"
          release_commit=$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse "$GITHUB_REF^{}")
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse HEAD)" = "$release_commit"
          git -c safe.directory="$GITHUB_WORKSPACE" fetch --no-tags origin \
            +refs/heads/main:refs/remotes/origin/main
          git -c safe.directory="$GITHUB_WORKSPACE" merge-base --is-ancestor \
            "$release_commit" origin/main
          test -z "$(git -c safe.directory="$GITHUB_WORKSPACE" rev-list --merges "$release_commit")"
          python -m quality.version --tag "$RELEASE_TAG"
          archive_name=$(python -c 'from distribution.archive import ARCHIVE_NAME; print(ARCHIVE_NAME)')
          test "$archive_name" = "doubt-$RELEASE_TAG-x86_64.tar.gz"
          grep -F "## $RELEASE_TAG -" CHANGELOG.md
      - name: Install pinned validation and build tools
        run: |
          python -m venv /tmp/doubt-release
          /tmp/doubt-release/bin/pip install --disable-pip-version-check -r requirements/dev.txt
          /tmp/doubt-release/bin/pip install --disable-pip-version-check \
            --require-hashes -r requirements/build.txt
          echo /tmp/doubt-release/bin >> "$GITHUB_PATH"
      - name: Complete local release gate
        run: ./check
      - name: Build deterministic release assets
        run: release/build "$RUNNER_TEMP/release"
      - name: Upload validated release assets
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-assets
          path: ${{ runner.temp }}/release
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out publication tooling
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false
          ref: ${{ github.ref }}
      - name: Verify publication source
        run: |
          [[ "$GITHUB_REF_TYPE" == tag ]]
          [[ "$GITHUB_REF" == "refs/tags/$RELEASE_TAG" ]]
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" cat-file -t "$GITHUB_REF")" = tag
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" for-each-ref \
            --format='%(contents:subject)' "$GITHUB_REF")" = "doubt $RELEASE_TAG"
          release_commit=$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse "$GITHUB_REF^{}")
          test "$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse HEAD)" = "$release_commit"
          python -m quality.version --tag "$RELEASE_TAG"
      - name: Download validated release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: release-assets
          path: ${{ runner.temp }}/release
      - name: Publish and verify public assets once
        env:
          GH_TOKEN: ${{ github.token }}
        run: release/publish "$RELEASE_TAG" "$RUNNER_TEMP/release"

  pages:
    name: Deploy verified release to Pages
    needs: publish
    permissions:
      contents: read
      pages: write
      id-token: write
    uses: ./.github/workflows/pages.yml
    with:
      tag: ${{ github.ref_name }}
