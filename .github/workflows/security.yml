name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  security:
    name: Arch Linux security gates
    runs-on: ubuntu-latest
    container:
      image: archlinux:base-devel-20260712.0.555161@sha256:212b1e518e94ee9c52be55e8a32da75fcf11e7b5610b80b49479e67880102406
    steps:
      - name: Bootstrap pinned Arch validation environment
        run: |
          printf 'Server = https://archive.archlinux.org/repos/2026/07/12/$repo/os/$arch\n' \
            >/etc/pacman.d/mirrorlist
          pacman -Sy --noconfirm --needed git python python-pip bash
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install security tools
        run: |
          python -m venv /tmp/doubt-security
          /tmp/doubt-security/bin/pip install --disable-pip-version-check -r requirements/dev.txt
          echo /tmp/doubt-security/bin >> "$GITHUB_PATH"
      - name: Committed-secret scan
        run: ./check secrets
      - name: Dangerous shell and execution patterns
        run: ./check danger
      - name: GitHub Actions immutable pins
        run: ./check actions
      - name: Development dependency advisories
        run: ./check advisory
